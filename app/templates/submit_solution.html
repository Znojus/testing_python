{% extends "base.html" %}

{% block content %}
    <h1>Submit a solution</h1>
    <form action="" method="post" enctype="multipart/form-data" novalidate>
        {{ form.hidden_tag() }}
        <p>
            {{ form.code_file.label}}<br>
            {{ form.code_file() }}<br>
            {% for error in form.code_file.errors %}
            <span style="color: red;">[{{ error }}]</span>
            {% endfor %}
        </p>
        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
